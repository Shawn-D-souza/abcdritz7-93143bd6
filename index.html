    <script>
      (function () {
        try {
          var theme = localStorage.getItem("vite-ui-theme");
          if (!theme) {
            theme = "system";
          }
          if (
            theme === "dark" ||
            (theme === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches)
          ) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.add("light");
          }
        } catch (e) {}
      })();
