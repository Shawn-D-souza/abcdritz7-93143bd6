<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ritz7 — No-Code & AI Community for Students</title>
    <meta
      name="description"
      content="Ritz7 is a student community that makes AI and no-code accessible — learn to build real projects without writing complex code."
    />
    <meta name="author" content="Ritz7" />
    <meta
      name="keywords"
      content="Ritz7, no-code, AI, students, community, n8n, automation, build without code"
    />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:title" content="Ritz7 — No-Code & AI Community for Students" />
    <meta
      property="og:description"
      content="A student community that makes AI and no-code accessible — build real projects without writing complex code."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ritz7ai.netlify.app" />
    <meta property="og:image" content="https://ritz7ai.netlify.app/assets/preview_logo.jpg" />
    <meta name="twitter:image" content="https://ritz7ai.netlify.app/assets/preview_logo.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta http-equiv="Permissions-Policy" content="compute-pressure=*" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("vite-ui-theme");
          if (!theme) {
            theme = "system";
          }
          if (
            theme === "dark" ||
            (theme === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches)
          ) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.add("light");
          }
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
